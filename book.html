    <div class="form-section">

    </div>

    <div class="form-section">

            <label for="carReg">Car Registration </label>

        </div>

        <div class="form-group">
            <label for="carMake">Car Make & Model </label>
            <input type="text" id="carMake" name="carMake" placeholder="e.g, Toyota Corolla" required>
        </div>

            <label>Vehicle Type </label>

                <div class="radio-option">
                    <input type="radio" id="suv" name="vehicleType" value="suv" required>

                </div>
                <div class="radio-option">

                    <label for="bakkie">Bakkie</label>
                </div>
                <div class="radio-option">

<script>

const bookingForm = document.getElementById('bookingForm'); /
    const formMessage = document.getElementById('formMessage');

    function displayError(message) {
        formMessage.textContent = message;
        
        formMessage.style.display = 'block';
        formMessage.style.color = 'red'; 
    }

    function clearError() {
        formMessage.textContent = '';
        formMessage.style.display = 'none';
    }

    // Function to check if at least one checkbox is selected
    function isServiceSelected() {
        const services = document.querySelectorAll('input[name="service"]:checked');
        return services.length > 0;
    }

    // Function to check if the booking date is in the future
    function isDateValid(dateString) {
        const selectedDate = new Date(dateString);
        const today = new Date();

        today.setHours(0, 0, 0, 0); 
        
        return selectedDate >= today;
    }

    //  ERROR FIXED HERE: Changed 'form' to 'bookingForm' 
    bookingForm.addEventListener('submit', function(event) {
        event.preventDefault(); // Stop the form from submitting initially
        
        // 1. Get Input Values 
        const fullName = document.getElementById('fullName').value.trim();
        const email = document.getElementById('email').value.trim();
        const phone = document.getElementById('phone').value.trim();
        const carReg = document.getElementById('carReg').value.trim();
        const carMake = document.getElementById('carMake').value.trim();
        const bookingDate = document.getElementById('bookingDate').value;

        let isValid = true;
        clearError();

        // 2. Validation Checks
        
        // A. Basic Field Empty Check (covers all text/email/tel inputs)
        if (fullName === '' || email === '' || phone === '' || carReg === '' || carMake === '' || bookingDate === '') {
            displayError('🚨 Please ensure all required text fields are filled out.');
            isValid = false;
        }

        // B. Full Name Length Check
        if (isValid && fullName.length < 3) {
            displayError('🚨 Full Name must be at least 3 characters long.');
            isValid = false;
        }

        // C. Email Format Check
        const emailRegex = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;
        if (isValid && !emailRegex.test(email)) {
            displayError('🚨 Please enter a valid email address.');
            isValid = false;
        }
        
        // D. Phone Number Check (Simple digit/length check)
        const phoneRegex = /^\d{8,15}$/;
        if (isValid && !phoneRegex.test(phone)) {
            displayError('🚨 Please enter a valid phone number (8-15 digits expected).');
            isValid = false;
        }

        // E. Vehicle Type Check (Required attribute helps, but this confirms radio button groups)
        const vehicleTypeSelected = document.querySelector('input[name="vehicleType"]:checked');
        if (isValid && !vehicleTypeSelected) {
            displayError('🚨 Please select a Vehicle Type.');
            isValid = false;
        }

        // F. Service Selection Check (Must choose at least one service)
        if (isValid && !isServiceSelected()) {
            displayError('🚨 You must select at least one Service.');
            isValid = false;
        }
        
        // G. Booking Date Check (Must be today or a future date)
        if (isValid && !isDateValid(bookingDate)) {
            displayError('🚨 The booking date cannot be in the past.');
            isValid = false;
        }

        if (isValid) {
           
            formMessage.textContent = 'Booking in progress...';
            formMessage.style.color = 'green';
            
           
            bookingForm.submit();
        }
    });
 
</script>
