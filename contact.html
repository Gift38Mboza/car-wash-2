<script>


    //  Get references to the form and the message paragraph
    const form = document.getElementById('form2');
    const formMessage = document.getElementById('formMessage');

    
    function displayError(message) {
        formMessage.textContent = message;
        formMessage.style.display = 'block'; /
    }
    function clearError() {
        formMessage.textContent = '';
        formMessage.style.display = 'none'; 
    }

    //  Attach an event listener to the form's submit event
    form.addEventListener('submit', function(event) {

        event.preventDefault();

    
        const name = document.getElementById('name').value.trim();
        const email = document.getElementById('email').value.trim();
        const subject = document.getElementById('subject').value.trim();
        const message = document.getElementById('message').value.trim();

        // Assume the form is valid initially
        let isValid = true;
        clearError(); 

        // --- VALIDATION RULES ---
        if (name === '' || email === '' || subject === '' || message === '') {
            displayError('🚨 All fields are required. Please fill them out.');
            isValid = false;
        }

        // B. Basic Name length check
        if (isValid && name.length < 4) {
            displayError('🚨 Name must be at least 4 characters long.');
            isValid = false;
        }
        

        const emailRegex = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;
        if (isValid && !emailRegex.test(email)) {
            displayError('🚨 Please enter a valid email address.');
            isValid = false;
        }

        // D. Message length check
        if (isValid && message.length < 10) {
            displayError('🚨 Message must be at least 10 characters long.');
            isValid = false;
        }

        // If all validation passes, submit the form
        if (isValid) {
            
            formMessage.textContent = 'Submitting...';
            formMessage.style.color = 'green';
            formMessage.style.display = 'block';

        
            form.submit();
        }
    });




</script>
